# Production Docker Compose for Wardrowbe homelab deployments.
# Configure deployment-specific values in a Portainer stack environment or a
# private .env/--env-file. Do not commit that secrets file.
#
# Note: Docker Compose variable interpolation happens before service env_file
# entries are loaded. If you use a file other than .env, pass it to Compose as
# --env-file (or load it in Portainer), and optionally set WARDROWBE_ENV_FILE to
# the same path so containers receive any non-interpolated variables too.

x-backend-build: &backend_build
  context: ./backend
  dockerfile: Dockerfile

x-backend-common-env: &backend_common_env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wardrobe}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your Portainer environment or .env}@postgres:5432/${POSTGRES_DB:-wardrobe}
  REDIS_URL: redis://redis:6379/0
  STORAGE_PATH: /data/uploads
  AI_BASE_URL: ${AI_BASE_URL:?Set AI_BASE_URL, for example your Ollama OpenAI-compatible /v1 endpoint}
  AI_API_KEY: ${AI_API_KEY:-not-needed}
  AI_VISION_MODEL: ${AI_VISION_MODEL:-llava:7b}
  AI_TEXT_MODEL: ${AI_TEXT_MODEL:-gemma3:latest}
  AI_TIMEOUT: ${AI_TIMEOUT:-300}
  AI_MAX_RETRIES: ${AI_MAX_RETRIES:-2}
  AI_MAX_TOKENS: ${AI_MAX_TOKENS:-8000}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DEBUG: ${DEBUG:-false}
  SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in your Portainer environment or .env}
  NTFY_SERVER: ${NTFY_SERVER:-}
  NTFY_TOPIC: ${NTFY_TOPIC:-}
  NTFY_TOKEN: ${NTFY_TOKEN:-}
  APP_URL: ${APP_URL:?Set APP_URL to the public application URL}
  BG_REMOVAL_PROVIDER: ${BG_REMOVAL_PROVIDER:-rembg}
  BG_REMOVAL_MODEL: ${BG_REMOVAL_MODEL:-u2net}
  BG_REMOVAL_URL: ${BG_REMOVAL_URL:-}
  BG_REMOVAL_API_KEY: ${BG_REMOVAL_API_KEY:-}

x-backend-service: &backend_service
  build: *backend_build
  env_file:
    - path: ${WARDROWBE_ENV_FILE:-.env}
      required: false
  volumes:
    - uploads_data:/data/uploads
  networks:
    - wardrobe_net

services:
  postgres:
    image: postgres:15-alpine
    container_name: wardrobe_postgres
    restart: unless-stopped
    env_file:
      - path: ${WARDROWBE_ENV_FILE:-.env}
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wardrobe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your Portainer environment or .env}
      POSTGRES_DB: ${POSTGRES_DB:-wardrobe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-wardrobe} -d $${POSTGRES_DB:-wardrobe}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - wardrobe_net

  redis:
    image: redis:7-alpine
    container_name: wardrobe_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - wardrobe_net

  migrate:
    <<: *backend_service
    container_name: wardrobe_migrate
    restart: "no"
    command: alembic upgrade head
    environment:
      <<: *backend_common_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    <<: *backend_service
    container_name: wardrobe_backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend_common_env
      # OIDC/Auth: NextAuth handles the browser login; the backend validates id_tokens during sync.
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:?Set OIDC_ISSUER_URL for your OIDC provider}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?Set OIDC_CLIENT_ID for the Authentik application}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?Set OIDC_CLIENT_SECRET for the Authentik application}
      OIDC_SKIP_SSL_VERIFY: ${OIDC_SKIP_SSL_VERIFY:-false}
      # Forward-auth headers are intentionally disabled by default. Enable only if
      # the backend is reachable exclusively through a trusted proxy that strips
      # spoofed auth headers from client requests.
      AUTH_TRUST_HEADER: ${AUTH_TRUST_HEADER:-false}
      AUTH_HEADER_NAME: ${AUTH_HEADER_NAME:-Remote-User}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    <<: *backend_service
    container_name: wardrobe_worker
    restart: unless-stopped
    command: arq app.workers.worker.WorkerSettings
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend_common_env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: wardrobe_frontend
    restart: unless-stopped
    env_file:
      - path: ${WARDROWBE_ENV_FILE:-.env}
        required: false
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:?Set NEXTAUTH_URL to the public application URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in your Portainer environment or .env}
      NEXT_PUBLIC_API_URL: ""
      BACKEND_URL: http://backend:8000
      DEV_MODE: ${DEBUG:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:?Set OIDC_ISSUER_URL for your OIDC provider}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?Set OIDC_CLIENT_ID for the Authentik application}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?Set OIDC_CLIENT_SECRET for the Authentik application}
      OIDC_END_SESSION_URL: ${OIDC_END_SESSION_URL:-}
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - wardrobe_net

  nginx:
    image: nginx:alpine
    container_name: wardrobe_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_BIND:-0.0.0.0}:${NGINX_PORT:-8080}:80"
    environment:
      NGINX_AI_TIMEOUT: ${NGINX_AI_TIMEOUT:-900}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
    command: >
      /bin/sh -c "envsubst '$${NGINX_AI_TIMEOUT}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -t && exec nginx -g 'daemon off;'"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - wardrobe_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  wardrobe_net:
    driver: bridge
